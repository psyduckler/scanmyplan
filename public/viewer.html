<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floorplan Results</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
  .container { max-width: 1600px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 6px; color: #333; }
  .meta { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
  .split-view { display: flex; gap: 20px; align-items: flex-start; }
  .left-panel { flex: 0 0 420px; max-height: 85vh; overflow-y: auto; }
  .right-panel { flex: 1; position: sticky; top: 20px; }
  .download-btns { display: flex; gap: 10px; margin-bottom: 10px; }
  .download-btns button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
  .download-btns button:hover { background: #f0f0f0; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
  th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 12px; }
  th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; z-index: 1; }
  tr.room-header td { background: #e2e8f0; font-weight: 700; font-size: 13px; color: #334155; padding: 8px; border-bottom: 2px solid #cbd5e1; }
  tr.item-row { cursor: pointer; transition: background 0.15s; }
  tr.item-row:hover { background: #e8f4ff; }
  tr.item-row.active { background: #cce5ff; }
  .img-container { position: relative; display: inline-block; }
  .img-container img { display: block; max-width: 100%; border: 1px solid #ddd; border-radius: 8px; }
  .img-container canvas { position: absolute; top: 0; left: 0; pointer-events: none; border-radius: 8px; }
  .item-count { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
  .loading { text-align: center; padding: 60px; color: #666; font-size: 18px; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #007bff; text-decoration: none; font-size: 14px; }
  .back-link:hover { text-decoration: underline; }

  .icon-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; font-size: 14px; opacity: 0.5; transition: opacity 0.2s; }
  .icon-btn:hover { opacity: 1; }
  .actions { white-space: nowrap; width: 60px; }
  .item-name.editing { background: #fff; }
  .item-name input { border: 1px solid #007bff; padding: 2px 4px; font-size: 13px; width: 100%; }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">← New Analysis</a>
  <h1>🪑 Floorplan Results</h1>
  <div class="meta" id="meta"></div>
  <div id="loading" class="loading">Loading results...</div>
  <div class="split-view" id="splitView" style="display:none;">
    <div class="left-panel" id="leftPanel"></div>
    <div class="right-panel" id="rightPanel"></div>
  </div>
</div>
<script>
let resultData = null, roomData = [], imgEl = null, canvasEl = null, naturalW = 0, naturalH = 0;
const resultId = window.location.pathname.split('/').pop();

async function load() {
  try {
    const res = await fetch('/api/results/' + resultId);
    if (!res.ok) { document.getElementById('loading').textContent = 'Result not found.'; return; }
    const meta = await res.json();
    resultData = meta.items;
    roomData = meta.rooms || [];
    naturalW = meta.imageDims.width;
    naturalH = meta.imageDims.height;
    document.getElementById('meta').textContent =
      (meta.documentNo ? 'Doc: ' + meta.documentNo + ' | ' : '') +
      (meta.customer ? 'Customer: ' + meta.customer + ' | ' : '') +
      meta.imageFile + ' | ' + new Date(meta.createdAt).toLocaleString();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('splitView').style.display = 'flex';
    let html = '<div class="item-count">' + resultData.length + ' items detected</div>';
    html += '<div class="download-btns"><button onclick="downloadJSON()">📥 JSON</button><button onclick="downloadCSV()">📥 CSV</button></div>';
    // Sort by room ascending
    resultData.sort((a, b) => {
      const na = parseInt(a.RoomNo) || 0, nb = parseInt(b.RoomNo) || 0;
      if (na !== nb) return na - nb;
      return a.RoomNo.localeCompare(b.RoomNo);
    });
    html += '<table><tr><th>ID</th><th>Room</th><th>Item</th><th>Acc</th><th></th></tr>';
    let currentRoom = null;
    for (let i = 0; i < resultData.length; i++) {
      const item = resultData[i];
      if (item.RoomNo !== currentRoom) {
        currentRoom = item.RoomNo;
        const roomCount = resultData.filter(x => x.RoomNo === currentRoom).length;
        html += '<tr class="room-header"><td colspan="5">Room ' + currentRoom + ' — ' + roomCount + ' item' + (roomCount !== 1 ? 's' : '') + '</td></tr>';
      }
      html += '<tr class="item-row" data-idx="' + i + '" onmouseenter="highlightItem(' + i + ')" onmouseleave="clearHighlight()"><td>' + item.ID + '</td><td>' + item.RoomNo + '</td><td class="item-name">' + item.ItemName + '</td><td>' + item.Accuracy + '</td><td class="actions"><button class="icon-btn" onclick="editItem(' + i + ')" title="Edit">✏️</button><button class="icon-btn" onclick="deleteItem(' + i + ')" title="Delete">🗑️</button></td></tr>';
    }
    html += '</table>';
    document.getElementById('leftPanel').innerHTML = html;
    const rp = document.getElementById('rightPanel');
    rp.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.className = 'img-container';
    imgEl = document.createElement('img');
    imgEl.src = '/api/results/' + resultId + '/image';
    imgEl.onload = () => {
      canvasEl = document.createElement('canvas');
      wrapper.appendChild(canvasEl);
      requestAnimationFrame(() => { canvasEl.width = imgEl.clientWidth; canvasEl.height = imgEl.clientHeight; });
    };
    wrapper.appendChild(imgEl);
    rp.appendChild(wrapper);
  } catch (e) { document.getElementById('loading').textContent = 'Error: ' + e.message; }
}
function highlightItem(idx) {
  if (!canvasEl || !resultData || !imgEl) return;
  const dispW = imgEl.clientWidth, dispH = imgEl.clientHeight;
  if (dispW === 0 || dispH === 0) return;
  canvasEl.width = dispW; canvasEl.height = dispH;
  const ctx = canvasEl.getContext('2d');
  ctx.clearRect(0, 0, dispW, dispH);
  if (idx < 0 || idx >= resultData.length) return;
  const item = resultData[idx];
  const room = roomsData.find(r => r.RoomNo === item.RoomNo);
  if (room) {
    const sx = dispW / naturalW, sy = dispH / naturalH;
    const x = room.x * sx, y = room.y * sy, w = room.width * sx, h = room.height * sy;
    ctx.fillStyle = 'rgba(0, 120, 255, 0.18)'; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#0078ff'; ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);
    const label = 'Room ' + item.RoomNo;
    ctx.font = 'bold 14px sans-serif';
    const tw = ctx.measureText(label).width;
    const ly = y > 24 ? y - 6 : y + h + 18;
    ctx.fillStyle = 'rgba(0,80,200,0.85)'; ctx.fillRect(x - 2, ly - 16, tw + 10, 22);
    ctx.fillStyle = '#fff'; ctx.fillText(label, x + 3, ly);
  }
  document.querySelectorAll('tr.item-row').forEach((r, i) => r.classList.toggle('active', i === idx));
}

function clearHighlight() {
  if (canvasEl) { const ctx = canvasEl.getContext('2d'); ctx.clearRect(0, 0, canvasEl.width, canvasEl.height); }
  document.querySelectorAll('tr.item-row.active').forEach(r => r.classList.remove('active'));
}

function editItem(idx) {
  const item = resultData[idx];
  const td = document.querySelector('tr[data-idx="' + idx + '"] .item-name');
  if (td.querySelector('input')) return; // already editing
  const input = document.createElement('input');
  input.value = item.ItemName;
  input.onkeydown = function(e) {
    if (e.key === 'Enter') { item.ItemName = input.value; td.textContent = input.value; }
    if (e.key === 'Escape') { td.textContent = item.ItemName; }
  };
  input.onblur = function() { item.ItemName = input.value; td.textContent = input.value; };
  td.textContent = '';
  td.appendChild(input);
  input.focus();
  input.select();
}

function deleteItem(idx) {
  resultData.splice(idx, 1);
  // Re-render the table
  const items = resultData;
  let html = '<div class="item-count">' + items.length + ' items detected</div>';
  html += '<div class="download-btns"><button onclick="downloadJSON()">📥 JSON</button><button onclick="downloadCSV()">📥 CSV</button></div>';
  html += '<table><tr><th>ID</th><th>Room</th><th>Item</th><th>Acc</th><th></th></tr>';
  let currentRoom = null;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (item.RoomNo !== currentRoom) {
      currentRoom = item.RoomNo;
      const roomCount = items.filter(x => x.RoomNo === currentRoom).length;
      html += '<tr class="room-header"><td colspan="5">Room ' + currentRoom + ' — ' + roomCount + ' item' + (roomCount !== 1 ? 's' : '') + '</td></tr>';
    }
    html += '<tr class="item-row" data-idx="' + i + '" onmouseenter="highlightItem(' + i + ')" onmouseleave="clearHighlight()"><td>' + item.ID + '</td><td>' + item.RoomNo + '</td><td class="item-name">' + item.ItemName + '</td><td>' + item.Accuracy + '</td><td class="actions"><button class="icon-btn" onclick="editItem(' + i + ')" title="Edit">✏️</button><button class="icon-btn" onclick="deleteItem(' + i + ')" title="Delete">🗑️</button></td></tr>';
  }
  html += '</table>';
  document.getElementById('leftPanel').innerHTML = html;
}

function downloadJSON() {
  if (!resultData) return;
  const blob = new Blob([JSON.stringify(resultData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'results-' + resultId + '.json'; a.click();
}
function downloadCSV() {
  if (!resultData) return;
  const headers = Object.keys(resultData[0]).join(',');
  const rows = resultData.map(r => Object.values(r).map(v => '"' + v + '"').join(','));
  const blob = new Blob([headers + '\n' + rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'results-' + resultId + '.csv'; a.click();
}
load();
</script>
</body>
</html>
